spring.application.name=user

#Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

## JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

## Database Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/users
spring.datasource.username=person
spring.datasource.password=admin

# Amazon SNS
spring.cloud.aws.region.static=us-east-2
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.sns.topic.user=arn:aws:sns:us-east-2:963665910885:MyTopic
